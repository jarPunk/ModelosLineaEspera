<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Colas Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>
    <py-config>
        [[fetch]]
        files = ["./logica_queues.py"]
    </py-config>

    <div class="app-container">
        <header>
            <h1>Calculadora de Colas</h1>
            <p>Análisis profesional de sistemas de espera</p>
        </header>

        <div class="card">
            <label for="modelSelector">Seleccionar Modelo</label>
            <select id="modelSelector" onchange="switchModel()">
                <option value="MM1">M/M/1</option>
                <option value="MD1">M/D/1</option>
                <option value="MMK">M/M/k</option>
                <option value="MG1">M/G/1</option>
                <option value="MGK">M/G/k (Erlang B)</option>
                <option value="MM1FF">M/M/1 Fuente Finita</option>
                <option value="MMKINF">M/M/k/∞/N</option>
            </select>

            <div id="MM1" class="tab-content active">
                <h3>Modelo M/M/1</h3>
                <div class="input-group"><label>λ (Tasa llegada):</label><input type="number" step="any" id="mm1_l" placeholder="Ej: 5"></div>
                <div class="input-group"><label>μ (Tasa servicio):</label><input type="number" step="any" id="mm1_m" placeholder="Ej: 8"></div>
                <div class="input-group"><label>n (opc):</label><input type="number" id="mm1_n" placeholder="Ej: 0"></div>
                <button py-click="calc_mm1_ui">Calcular</button>
                <div id="res_mm1" class="result-area"></div>
            </div>

            <div id="MD1" class="tab-content">
                <h3>Modelo M/D/1</h3>
                <div class="input-group"><label>λ (Tasa llegada):</label><input type="number" step="any" id="md1_l" placeholder="Ej: 4"></div>
                <div class="input-group"><label>μ (Tasa servicio):</label><input type="number" step="any" id="md1_m" placeholder="Ej: 6"></div>
                <button py-click="calc_md1_ui">Calcular</button>
                <div id="res_md1" class="result-area"></div>
            </div>

            <div id="MMK" class="tab-content">
                <h3>Modelo M/M/k</h3>
                <div class="input-group"><label>λ (Tasa llegada):</label><input type="number" step="any" id="mmk_l" placeholder="Ej: 10"></div>
                <div class="input-group"><label>μ (Tasa servicio):</label><input type="number" step="any" id="mmk_m" placeholder="Ej: 4"></div>
                <div class="input-group"><label>k (Servidores):</label><input type="number" id="mmk_k" placeholder="Ej: 3"></div>
                <div class="input-group"><label>n (opc):</label><input type="number" id="mmk_n" placeholder="Ej: 1"></div>
                <button py-click="calc_mmk_ui">Calcular</button>
                <div id="res_mmk" class="result-area"></div>
            </div>

            <div id="MG1" class="tab-content">
                <h3>Modelo M/G/1</h3>
                <div class="input-group"><label>λ (Tasa llegada):</label><input type="number" step="any" id="mg1_l" placeholder="Ej: 2"></div>
                <div class="input-group"><label>μ (Tasa servicio):</label><input type="number" step="any" id="mg1_m" placeholder="Ej: 3"></div>
                <div class="input-group"><label>σ (Desviación estándar):</label><input type="number" step="any" id="mg1_sigma" placeholder="Ej: 0.2"></div>
                <button py-click="calc_mg1_ui">Calcular</button>
                <div id="res_mg1" class="result-area"></div>
            </div>

            <div id="MGK" class="tab-content">
                <h3>M/G/k (Bloqueo)</h3>
                <div class="input-group"><label>λ (Tasa llegada):</label><input type="number" step="any" id="mgk_l" placeholder="Ej: 10"></div>
                <div class="input-group"><label>μ (Tasa servicio):</label><input type="number" step="any" id="mgk_m" placeholder="Ej: 5"></div>
                <div class="input-group"><label>k (Canales):</label><input type="number" id="mgk_k" placeholder="Ej: 3"></div>
                <div class="input-group"><label>j (opc):</label><input type="number" id="mgk_j" placeholder="Ej: 1"></div>
                <button py-click="calc_mgk_ui">Calcular</button>
                <div id="res_mgk" class="result-area"></div>
            </div>

            <div id="MM1FF" class="tab-content">
                <h3>M/M/1 Fuente Finita</h3>
                <div class="input-group"><label>λ (Tasa por fuente):</label><input type="number" step="any" id="mm1ff_l" placeholder="Ej: 0.1"></div>
                <div class="input-group"><label>μ (Tasa servicio):</label><input type="number" step="any" id="mm1ff_m" placeholder="Ej: 0.5"></div>
                <div class="input-group"><label>N (Población):</label><input type="number" id="mm1ff_n" placeholder="Ej: 10"></div>
                <div class="input-group"><label>n (opc):</label><input type="number" id="mm1ff_np" placeholder="Ej: 2"></div>
                <button py-click="calc_mm1ff_ui">Calcular</button>
                <div id="res_mm1ff" class="result-area"></div>
            </div>

            <div id="MMKINF" class="tab-content">
                <h3>M/M/k/∞/N</h3>
                <div class="input-group"><label>λ (Tasa por fuente):</label><input type="number" step="any" id="mmkinf_l" placeholder="Ej: 0.1"></div>
                <div class="input-group"><label>μ (Tasa servicio):</label><input type="number" step="any" id="mmkinf_m" placeholder="Ej: 0.5"></div>
                <div class="input-group"><label>k (Servidores):</label><input type="number" id="mmkinf_k" placeholder="Ej: 2"></div>
                <div class="input-group"><label>N (Población):</label><input type="number" id="mmkinf_n" placeholder="Ej: 5"></div>
                <button py-click="calc_mmkinf_ui">Calcular</button>
                <div id="res_mmkinf" class="result-area"></div>
            </div>
        </div>
    </div>

    <script type="py">
        from pyscript import document
        import logica_queues as lq

        def get_val(id): return document.querySelector(f"#{id}").value

        def show_res(id, res):
            div = document.querySelector(f"#res_{id}")
            if isinstance(res, str): # Error
                div.innerHTML = f"<div class='error-msg'>{res}</div>"
            else:
                # Diccionario para mapear claves a símbolos de tu tabla
                simbolos = {
                    "P0": "P₀", "Pn": "Pₙ", "Pw": "P_w", "ρ": "ρ",
                    "Lq": "L_q", "L": "L", "Wq": "W_q", "W": "W",
                    "λe": "λₑ", "Pk = Pb": "P_k (P_b)", "a = λ/μ": "a (λ/μ)",
                    "E[S]": "E[S]", "E[S^2]": "E[S²]"
                }
                
                # Función para formatear el símbolo con subíndices bonitos
                def formatear_simbolo(s):
                    # Reemplazos para mostrar como P₀, Lq, Wq...
                    # Usamos etiquetas HTML <sub> para subíndices bonitos
                    mapa = {
                        "P0": "P<sub>0</sub>",
                        "Pn": "P<sub>n</sub>",
                        "Lq": "L<sub>q</sub>",
                        "L_q": "L<sub>q</sub>",
                        "Wq": "W<sub>q</sub>",
                        "W_q": "W<sub>q</sub>",
                        "λe": "λ<sub>e</sub>",
                        "λ_e": "λ<sub>e</sub>",
                        "Pk = Pb": "P<sub>k</sub> (P<sub>b</sub>)"
                    }
                    return mapa.get(s, s)

                html_res = "<table class='res-table'>"
                for k, v in res.items():
                    # Usar mapeo de símbolos
                    display_k = formatear_simbolo(k)
                    html_res += f"<tr><td><strong>{display_k}</strong></td><td>{v:.4f}</td></tr>"
                html_res += "</table>"
                div.innerHTML = html_res

        # ... (las funciones calc_..._ui se mantienen igual)
        def calc_mm1_ui(event):
            try:
                l = float(get_val("mm1_l"))
                m = float(get_val("mm1_m"))
                n = int(get_val("mm1_n")) if get_val("mm1_n") else None
                show_res("mm1", lq.calc_mm1(l, m, n))
            except Exception as e: show_res("mm1", str(e))

        def calc_md1_ui(event):
            try:
                l = float(get_val("md1_l"))
                m = float(get_val("md1_m"))
                show_res("md1", lq.calc_md1(l, m))
            except Exception as e: show_res("md1", str(e))
            
        def calc_mmk_ui(event):
            try:
                res = lq.calc_mmk(float(get_val("mmk_l")), float(get_val("mmk_m")), int(get_val("mmk_k")), int(get_val("mmk_n")) if get_val("mmk_n") else None)
                show_res("mmk", res)
            except Exception as e: show_res("mmk", str(e))
            
        def calc_mg1_ui(event):
            try:
                # Obtenemos σ, calculamos Cs^2 = (σ * μ)^2
                sigma = float(get_val("mg1_sigma"))
                mu = float(get_val("mg1_m"))
                es = 1 / mu
                cs2 = (sigma / es) ** 2
                
                res = lq.calc_mg1(float(get_val("mg1_l")), mu, cs2)
                show_res("mg1", res)
            except Exception as e: show_res("mg1", str(e))

        def calc_mgk_ui(event):
            try:
                res = lq.calc_mgk_bloqueo(float(get_val("mgk_l")), float(get_val("mgk_m")), int(get_val("mgk_k")), int(get_val("mgk_j")) if get_val("mgk_j") else None)
                show_res("mgk", res)
            except Exception as e: show_res("mgk", str(e))

        def calc_mm1ff_ui(event):
            try:
                res = lq.calc_mm1_fuente_finita(float(get_val("mm1ff_l")), float(get_val("mm1ff_m")), int(get_val("mm1ff_n")), int(get_val("mm1ff_np")) if get_val("mm1ff_np") else None)
                show_res("mm1ff", res)
            except Exception as e: show_res("mm1ff", str(e))

        def calc_mmkinf_ui(event):
            try:
                res = lq.calc_mmk_infinito_n(float(get_val("mmkinf_l")), float(get_val("mmkinf_m")), int(get_val("mmkinf_k")), int(get_val("mmkinf_n")))
                show_res("mmkinf", res)
            except Exception as e: show_res("mmkinf", str(e))
    </script>

    <script>
        function switchModel() {
            let modelId = document.getElementById("modelSelector").value;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(modelId).classList.add('active');
        }
    </script>
</body>
</html>
